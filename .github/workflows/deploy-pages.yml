name: Deploy verified welcome site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 暴力驗證正式投影
        run: python3 tools/verify_portal.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build deterministic site artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/mini _site/ui/shrine
          cp index.html _site/index.html
          cp mini/index.html _site/mini/index.html
          cp ui/shrine/index.html _site/ui/shrine/index.html
          cp PORTAL_MANIFEST.json _site/PORTAL_MANIFEST.json
          cp PORTAL_LOCATOR.json _site/PORTAL_LOCATOR.json
          cp PORTAL_REVERSECHAIN.json _site/PORTAL_REVERSECHAIN.json
          cp PORTAL_SHA256SUMS _site/PORTAL_SHA256SUMS
          touch _site/.nojekyll
          test -s _site/index.html
          test -s _site/mini/index.html
          test -s _site/ui/shrine/index.html
          test -s _site/PORTAL_MANIFEST.json
          test -s _site/PORTAL_LOCATOR.json
          test -s _site/PORTAL_REVERSECHAIN.json
          test -s _site/PORTAL_SHA256SUMS

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
