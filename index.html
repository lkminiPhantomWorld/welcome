<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎光臨 lkminiPhantomWorld</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* 開場動畫容器 */
        #intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.8s ease-out;
        }
        
        #intro-container.hidden {
            pointer-events: none;
            opacity: 0;
        }
        
        canvas {
            display: block;
            background: transparent;
        }
        
        /* 主頁面 */
        #main-content {
            padding: 2rem 1rem;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 0.8s ease-in 0.3s;
        }
        
        #main-content.show {
            opacity: 1;
        }
        
        .container {
            max-width: 720px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            color: #f0f6fc;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .subtitle {
            font-size: 1rem;
            color: #8b949e;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        /* 角色卡網格 */
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        
        .character-card {
            background: #161b22;
            border: 2px solid #21262d;
            border-radius: 12px;
            padding: 1.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
        }
        
        .character-card:hover {
            border-color: #58a6ff;
            background: #0d1117;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(88, 166, 255, 0.2);
        }

        .character-card.shrine:hover {
            border-color: #e8c87a;
            box-shadow: 0 8px 24px rgba(232, 200, 122, 0.2);
        }
        
        .character-emoji {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .character-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #f0f6fc;
        }

        .character-sub {
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: 0.25rem;
        }
        
        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid #21262d;
            font-size: 0.8rem;
            color: #484f58;
            text-align: center;
        }
        
        @media (max-width: 600px) {
            .characters-grid {
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
                gap: 0.8rem;
            }
            
            .character-card {
                padding: 1rem 0.5rem;
                min-height: 130px;
            }
            
            .character-emoji {
                font-size: 2rem;
            }
            
            .character-name {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- 開場動畫 -->
    <div id="intro-container">
        <canvas id="intro-canvas"></canvas>
    </div>
    
    <!-- 主頁面 -->
    <div id="main-content">
        <div class="container">
            <h1>✨ lkminiPhantomWorld</h1>
            <p class="subtitle">歡迎光臨 ~ 跟我來</p>
            
            <!-- 角色卡網格 -->
            <div class="characters-grid">
                <a href="mini/" class="character-card">
                    <div class="character-emoji">🥃</div>
                    <div class="character-name">大管家</div>
                    <div class="character-sub">系統本體</div>
                </a>
                
                <a href="#" class="character-card">
                    <div class="character-emoji">💬</div>
                    <div class="character-name">小蜜</div>
                    <div class="character-sub">隨身秘書</div>
                </a>
                
                <a href="#" class="character-card">
                    <div class="character-emoji">❄️</div>
                    <div class="character-name">凌凌</div>
                    <div class="character-sub">投資</div>
                </a>
                
                <a href="#" class="character-card">
                    <div class="character-emoji">🤖</div>
                    <div class="character-name">機器人</div>
                    <div class="character-sub">風控 · 自動化</div>
                </a>
                
                <a href="#" class="character-card">
                    <div class="character-emoji">⚖️</div>
                    <div class="character-name">王牌</div>
                    <div class="character-sub">法務</div>
                </a>
                
                <a href="#" class="character-card">
                    <div class="character-emoji">🌊</div>
                    <div class="character-name">泱泱</div>
                    <div class="character-sub">生活吃喝玩樂</div>
                </a>
                
                <a href="#" class="character-card">
                    <div class="character-emoji">💭</div>
                    <div class="character-name">心語</div>
                    <div class="character-sub">幻想 · 私密</div>
                </a>
                
                <a href="#" class="character-card">
                    <div class="character-emoji">👗</div>
                    <div class="character-name">婉婉</div>
                    <div class="character-sub">角色管理</div>
                </a>
                
                <a href="#" class="character-card">
                    <div class="character-emoji">🎨</div>
                    <div class="character-name">畫家</div>
                    <div class="character-sub">素材庫</div>
                </a>
                
                <a href="#" class="character-card">
                    <div class="character-emoji">🦀</div>
                    <div class="character-name">螃蟹</div>
                    <div class="character-sub">餐廳</div>
                </a>
                
                <a href="#" class="character-card">
                    <div class="character-emoji">⚡️</div>
                    <div class="character-name">快客</div>
                    <div class="character-sub">執行官</div>
                </a>
                
                <a href="#" class="character-card">
                    <div class="character-emoji">🧚</div>
                    <div class="character-name">精靈</div>
                    <div class="character-sub">精靈世界</div>
                </a>
                
                <a href="ui/shrine/" class="character-card shrine">
                    <div class="character-emoji">⛩️</div>
                    <div class="character-name">祭祀</div>
                    <div class="character-sub">供品台 · 歸檔</div>
                </a>
            </div>
            
            <footer>
                lkminiPhantomWorld · 2026 · Made with ✨
            </footer>
        </div>
    </div>
    
    <script>
        class IntroAnimation {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                
                this.particles = [];
                this.spiritX = this.canvas.width / 2;
                this.spiritY = this.canvas.height / 2;
                this.portalX = this.canvas.width / 2;
                this.portalY = this.canvas.height / 2;
                this.stage = 0;
                this.stageTime = 0;
                
                this.createStars();
                this.animate();
            }
            
            createStars() {
                for (let i = 0; i < 100; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        radius: Math.random() * 1.5,
                        opacity: Math.random() * 0.5 + 0.5,
                        twinkleSpeed: Math.random() * 0.02 + 0.01
                    });
                }
            }
            
            drawStars() {
                this.particles.forEach(star => {
                    star.opacity += star.twinkleSpeed;
                    if (star.opacity > 1 || star.opacity < 0.3) {
                        star.twinkleSpeed *= -1;
                    }
                    this.ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                    this.ctx.fillRect(star.x, star.y, star.radius, star.radius);
                });
            }
            
            drawSpirit(x, y, handWave = false) {
                this.ctx.fillStyle = '#FFD700';
                this.ctx.beginPath();
                this.ctx.arc(x, y, 20, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.fillStyle = '#000';
                this.ctx.beginPath();
                this.ctx.arc(x - 8, y - 5, 4, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.arc(x + 8, y - 5, 4, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.strokeStyle = '#000';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.arc(x, y + 2, 6, 0, Math.PI, false);
                this.ctx.stroke();
                
                if (handWave) {
                    const waveOffset = Math.sin(this.stageTime * 0.1) * 15;
                    this.ctx.strokeStyle = '#FFD700';
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.moveTo(x + 20, y);
                    this.ctx.lineTo(x + 35 + waveOffset, y - 15 + waveOffset);
                    this.ctx.stroke();
                }
            }
            
            drawPortal(x, y, glow = 0) {
                const radius = 50 + glow * 10;
                
                this.ctx.strokeStyle = `rgba(138, 43, 226, ${Math.min(glow * 0.3, 0.8)})`;
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();
                this.ctx.arc(x, y, radius, 0, Math.PI * 2);
                this.ctx.stroke();
                
                const gradient = this.ctx.createRadialGradient(x, y, 20, x, y, radius);
                gradient.addColorStop(0, `rgba(138, 43, 226, 0.6)`);
                gradient.addColorStop(1, `rgba(138, 43, 226, 0.1)`);
                
                this.ctx.fillStyle = gradient;
                this.ctx.beginPath();
                this.ctx.arc(x, y, radius, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.strokeStyle = `rgba(138, 43, 226, ${0.8 + glow * 0.2})`;
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.arc(x, y, radius, 0, Math.PI * 2);
                this.ctx.stroke();
            }
            
            drawText(text, x, y) {
                this.ctx.font = 'bold 24px Arial';
                this.ctx.fillStyle = '#FFD700';
                this.ctx.textAlign = 'center';
                this.ctx.fillText(text, x, y);
            }
            
            animate() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.drawStars();
                this.stageTime++;
                
                if (this.stage === 0) {
                    if (this.stageTime > 60) { this.stage = 1; this.stageTime = 0; }
                } 
                else if (this.stage === 1) {
                    this.spiritY = this.canvas.height / 2 - (this.stageTime * 3);
                    this.drawSpirit(this.spiritX, this.spiritY, true);
                    if (this.stageTime > 50) { this.stage = 2; this.stageTime = 0; }
                } 
                else if (this.stage === 2) {
                    this.drawSpirit(this.spiritX, this.spiritY - 150, true);
                    if (this.stageTime < 40) {
                        this.drawText('Hi ~', this.canvas.width / 2, this.canvas.height / 2 - 50);
                    } else if (this.stageTime < 80) {
                        this.drawText('歡迎光臨', this.canvas.width / 2, this.canvas.height / 2 - 50);
                    } else if (this.stageTime < 120) {
                        this.drawText('跟我來', this.canvas.width / 2, this.canvas.height / 2 - 50);
                    } else {
                        this.stage = 3; this.stageTime = 0;
                    }
                }
                else if (this.stage === 3) {
                    const progress = this.stageTime / 80;
                    this.spiritX = this.canvas.width / 2 + progress * 100;
                    this.spiritY = (this.canvas.height / 2 - 150) + progress * 200;
                    this.drawSpirit(this.spiritX, this.spiritY, false);
                    this.drawPortal(this.canvas.width / 2, this.canvas.height / 2 + 100);
                    if (this.stageTime > 80) { this.stage = 4; this.stageTime = 0; }
                }
                else if (this.stage === 4) {
                    const progress = this.stageTime / 40;
                    this.spiritX = this.canvas.width / 2 + 100 * (1 - progress);
                    this.spiritY = (this.canvas.height / 2 + 100) * (1 - progress * 0.5);
                    this.ctx.globalAlpha = 1 - progress;
                    this.drawSpirit(this.spiritX, this.spiritY, false);
                    this.ctx.globalAlpha = 1;
                    const glow = this.stageTime / 40;
                    this.drawPortal(this.canvas.width / 2, this.canvas.height / 2 + 100, glow);
                    if (this.stageTime > 40) { this.stage = 5; this.stageTime = 0; }
                }
                else if (this.stage === 5) {
                    this.drawPortal(this.canvas.width / 2, this.canvas.height / 2 + 100, 1);
                    this.drawText('點擊傳送門進入', this.canvas.width / 2, this.canvas.height / 2 + 200);
                }
                
                if (this.stage < 5) {
                    requestAnimationFrame(() => this.animate());
                } else {
                    this.canvas.style.cursor = 'pointer';
                    this.canvas.onclick = () => this.enterWorld();
                }
            }
            
            enterWorld() {
                const container = document.getElementById('intro-container');
                const mainContent = document.getElementById('main-content');
                
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                let progress = 0;
                const suckInterval = setInterval(() => {
                    progress += 0.05;
                    this.ctx.fillStyle = '#000';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.drawStars();
                    this.drawPortal(this.canvas.width / 2, this.canvas.height / 2 + 100, 1);
                    this.ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(progress * 0.5, 1)})`;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    if (progress > 1) {
                        clearInterval(suckInterval);
                        container.classList.add('hidden');
                        mainContent.classList.add('show');
                    }
                }, 30);
            }
        }
        
        window.addEventListener('load', () => {
            const canvas = document.getElementById('intro-canvas');
            new IntroAnimation(canvas);
        });
    </script>
</body>
</html>
