<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>🔍 公開資產搜尋器</title><style>*{box-sizing:border-box}body{margin:0;background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif}main{max-width:780px;margin:auto;padding:18px}.card{background:#161b22;border:1px solid #30363d;border-radius:18px;padding:16px;margin:12px 0}.muted{color:#8b949e;line-height:1.6}.controls{display:grid;gap:10px}input,select{width:100%;font:inherit;color:#e6edf3;background:#21262d;border:1px solid #30363d;border-radius:13px;padding:13px}.result{display:block;text-decoration:none;color:#e6edf3;background:#21262d;border:1px solid #30363d;border-radius:15px;padding:14px;margin:10px 0}.title{font-weight:800}.meta{font-size:12px;color:#8b949e;margin-top:7px}.back{color:#e6edf3;text-decoration:none}</style></head><body><main><section class="card"><h1>🔍 公開資產搜尋器</h1><p class="muted">只搜尋公開工作層目錄；查詢在瀏覽器內完成，不上傳查詢內容。</p></section><section class="card controls"><label>關鍵字<input id="query" type="search" placeholder="匯入、回執、邊界、膠囊"></label><label>分類<select id="category"><option value="">全部分類</option></select></label><label>狀態<select id="status"><option value="">全部狀態</option><option>VERIFIED_TRUE</option><option>USER_CONFIRMED</option><option>HYPOTHESIS</option><option>VERIFIED_FALSE</option></select></label><div id="count" class="muted" aria-live="polite"></div></section><section id="results" class="card"></section><a class="back" href="../../">← 回唯一路口</a><noscript><section class="card">HYPOTHESIS：JavaScript 未啟用。請改用 <a class="back" href="../../archive/">資產封存索引</a>。</section></noscript></main><script src="../asset-catalog.js"></script><script src="search-core.js"></script><script>(function(){"use strict";const assets=Array.isArray(window.LK_PUBLIC_ASSETS)?window.LK_PUBLIC_ASSETS:[],api=window.LKAssetSearch,q=document.getElementById("query"),cat=document.getElementById("category"),st=document.getElementById("status"),out=document.getElementById("results"),count=document.getElementById("count");[...new Set(assets.map(x=>x.category))].sort().forEach(name=>{const o=document.createElement("option");o.value=o.textContent=name;cat.appendChild(o)});function render(){const found=api.filterAssets(assets,{query:q.value,category:cat.value,status:st.value});count.textContent=`找到 ${found.length}／${assets.length} 個公開資產`;out.replaceChildren();if(!found.length){out.textContent="沒有符合的公開資產。";return}found.forEach(a=>{const link=document.createElement("a");link.className="result";link.href=api.resolveAssetHref("../../",a.path);const title=document.createElement("div");title.className="title";title.textContent=`${a.emoji} ${a.name}`;const desc=document.createElement("div");desc.className="muted";desc.textContent=a.description;const meta=document.createElement("div");meta.className="meta";meta.textContent=`${a.category} · ${a.status} · ${a.publicReady?"公開部署已驗證":"公開部署待驗證"}`;link.append(title,desc,meta);out.appendChild(link)})}q.addEventListener("input",render);cat.addEventListener("change",render);st.addEventListener("change",render);render()})();</script></body></html>
