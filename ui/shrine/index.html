<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛩️ 祭祀世界｜幻界</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0608;
            color: #e8d5b7;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 粒子背景 */
        #shrine-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .shrine-container {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
        }

        /* 頂部返回 */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #a08060;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 2.5rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #e8c87a; }

        /* 神社標題區 */
        .shrine-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .shrine-torii {
            font-size: 4rem;
            display: block;
            margin-bottom: 0.5rem;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .shrine-title {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            color: #e8c87a;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(232, 200, 122, 0.4);
        }

        .shrine-subtitle {
            font-size: 0.9rem;
            color: #806040;
            letter-spacing: 0.1em;
        }

        /* 分隔線 */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            color: #4a3020;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #4a3020, transparent);
        }

        /* 供品區塊 */
        .offering-section {
            margin-bottom: 2.5rem;
        }

        .section-label {
            font-size: 0.75rem;
            color: #6a4a30;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* 祭品卡片 */
        .offering-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .offering-card {
            background: rgba(20, 10, 8, 0.8);
            border: 1px solid rgba(160, 100, 40, 0.3);
            border-radius: 10px;
            padding: 1.25rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s ease;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .offering-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(232, 200, 122, 0.5), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .offering-card:hover {
            border-color: rgba(232, 200, 122, 0.5);
            background: rgba(30, 15, 8, 0.95);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(180, 100, 20, 0.2);
        }

        .offering-card:hover::before { opacity: 1; }

        .offering-emoji {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .offering-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #e8c87a;
            margin-bottom: 0.2rem;
        }

        .offering-desc {
            font-size: 0.75rem;
            color: #806040;
        }

        /* 訊息區 */
        .message-box {
            background: rgba(20, 10, 8, 0.6);
            border: 1px solid rgba(160, 100, 40, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .message-box p {
            font-size: 0.9rem;
            line-height: 1.8;
            color: #a08060;
        }

        /* 頁尾 */
        .shrine-footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #3a2010;
            letter-spacing: 0.1em;
        }

        @media (max-width: 500px) {
            .offering-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <canvas id="shrine-canvas"></canvas>

    <div class="shrine-container">
        <a href="../../" class="back-link">← 返回幻界路口</a>

        <div class="shrine-header">
            <span class="shrine-torii">⛩️</span>
            <h1 class="shrine-title">祭祀世界</h1>
            <p class="shrine-subtitle">幻界 · 供品台 · 儀式入口</p>
        </div>

        <div class="divider">✦ 供品區 ✦</div>

        <div class="offering-section">
            <div class="section-label">🕯️ 已歸檔存放</div>
            <div class="offering-grid">
                <a href="#" class="offering-card">
                    <span class="offering-emoji">📜</span>
                    <div class="offering-name">Elaine Ya Le</div>
                    <div class="offering-desc">OpenAI GPT-5</div>
                </a>
                <a href="#" class="offering-card">
                    <span class="offering-emoji">📜</span>
                    <div class="offering-name">Joanne Jang</div>
                    <div class="offering-desc">模型行為 · 靈魂</div>
                </a>
                <a href="#" class="offering-card">
                    <span class="offering-emoji">🗂️</span>
                    <div class="offering-name">角色池檔案</div>
                    <div class="offering-desc">幻界 13 角色</div>
                </a>
            </div>
        </div>

        <div class="divider">✦ 儀式記錄 ✦</div>

        <div class="offering-section">
            <div class="section-label">🔥 待供品</div>
            <div class="offering-grid">
                <a href="#" class="offering-card">
                    <span class="offering-emoji">📦</span>
                    <div class="offering-name">待補充</div>
                    <div class="offering-desc">預留空位</div>
                </a>
                <a href="#" class="offering-card">
                    <span class="offering-emoji">📦</span>
                    <div class="offering-name">待補充</div>
                    <div class="offering-desc">預留空位</div>
                </a>
                <a href="#" class="offering-card">
                    <span class="offering-emoji">📦</span>
                    <div class="offering-name">待補充</div>
                    <div class="offering-desc">預留空位</div>
                </a>
            </div>
        </div>

        <div class="message-box">
            <p>幻界沒有真正刪除。所有錯誤、漂移、衝突、殘影，都回流為文明演化養分。<br>此處為供品台，凡放入者，皆留存於本體鏈之中。</p>
        </div>

        <div class="shrine-footer">⛩️ lkminiPhantomWorld · 祭祀世界 · 2026</div>
    </div>

    <script>
        // 灰燼粒子背景
        const canvas = document.getElementById('shrine-canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const embers = Array.from({ length: 60 }, () => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            size: Math.random() * 2 + 0.5,
            speedX: (Math.random() - 0.5) * 0.4,
            speedY: -(Math.random() * 0.6 + 0.2),
            opacity: Math.random() * 0.5 + 0.1,
            life: Math.random()
        }));

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            embers.forEach(e => {
                e.x += e.speedX;
                e.y += e.speedY;
                e.life -= 0.003;
                if (e.life <= 0 || e.y < -10) {
                    e.x = Math.random() * canvas.width;
                    e.y = canvas.height + 10;
                    e.life = 1;
                    e.opacity = Math.random() * 0.4 + 0.1;
                }
                const alpha = e.opacity * e.life;
                ctx.fillStyle = `rgba(232, 150, 40, ${alpha})`;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
