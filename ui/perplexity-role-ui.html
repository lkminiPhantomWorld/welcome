<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>perplexity-role-ui</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-6: 1.5rem; --space-8: 2rem; --space-12: 3rem;
      --color-bg: #0d1117;
      --color-surface: rgba(20,30,48,0.60);
      --color-surface-2: rgba(255,255,255,0.10);
      --color-border: rgba(255,255,255,0.18);
      --color-text: #eef5ff;
      --color-text-muted: rgba(238,245,255,0.72);
      --color-text-faint: rgba(238,245,255,0.48);
      --color-primary: #20bfa9;
      --shadow-lg: 0 18px 50px rgba(0,0,0,0.50);
      --radius-lg: 24px; --radius-xl: 32px; --radius-full: 9999px;
      --font-body: 'Satoshi', 'Inter', sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; min-height:100%; }
    body {
      font-family: var(--font-body);
      background: linear-gradient(180deg, #0d2137 0%, #060c14 100%);
      color: var(--color-text);
      min-height: 100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: var(--space-6);
    }
    .shell { width:min(100%, 430px); }
    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      background: #060f1a;
      min-height: 780px;
    }
    .photo {
      position:absolute; inset:0;
      background: linear-gradient(160deg, #0d2137 0%, #06111e 60%, #030a12 100%);
      overflow: hidden;
    }
    .code-rain {
      position:absolute; inset:0;
      display:flex; gap:2px; padding:0 4px;
      opacity: 0.18;
      pointer-events: none;
    }
    .col {
      display:flex; flex-direction:column;
      gap:0; font-family: monospace; font-size:11px;
      color: #20bfa9;
      animation: fall linear infinite;
      animation-duration: calc(var(--dur, 6) * 1s);
      animation-delay: calc(var(--delay, 0) * 1s);
    }
    @keyframes fall {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(110%); }
    }
    .glow {
      position:absolute; border-radius:50%; pointer-events:none;
      filter: blur(60px); opacity:0.22;
    }
    .glow-1 { width:260px; height:260px; background:#20bfa9; top:-60px; right:-40px; }
    .glow-2 { width:200px; height:200px; background:#3b82f6; bottom:80px; left:-60px; }
    .veil { position:absolute; inset:0; background: linear-gradient(180deg, rgba(6,15,26,.05) 0%, rgba(6,15,26,.20) 30%, rgba(6,15,26,.55) 65%, rgba(6,15,26,.88) 100%); }
    .topbar {
      position:absolute; top:18px; left:18px; display:flex; gap:10px; z-index:2;
      padding:10px 12px; border-radius:18px;
      background:rgba(32,191,169,.14); backdrop-filter: blur(12px);
      border:1px solid rgba(32,191,169,.28);
    }
    .icon-btn {
      width:44px; height:44px; border-radius:14px; border:1px solid transparent;
      display:grid; place-items:center; color:var(--color-text); text-decoration:none;
      background:rgba(255,255,255,.05); backdrop-filter: blur(8px);
    }
    .icon-btn:hover { background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.18); }
    .icon-btn svg { width:20px; height:20px; }
    .ai-avatar {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) translateY(-60px);
      z-index:2; display:flex; flex-direction:column; align-items:center; gap:10px;
    }
    .ai-orb {
      width:96px; height:96px; border-radius:50%;
      background: radial-gradient(circle at 38% 36%, #3cf4e0 0%, #20bfa9 40%, #0e7a6e 100%);
      box-shadow: 0 0 40px rgba(32,191,169,.55), 0 0 80px rgba(32,191,169,.25);
      display:grid; place-items:center;
      font-size:2.4rem; line-height:1;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 40px rgba(32,191,169,.55), 0 0 80px rgba(32,191,169,.25); }
      50%      { box-shadow: 0 0 55px rgba(32,191,169,.80), 0 0 110px rgba(32,191,169,.40); }
    }
    .ai-status {
      font-size: var(--text-xs); font-weight:700; letter-spacing:.12em;
      color: #20bfa9; text-transform:uppercase;
      background: rgba(32,191,169,.12); border:1px solid rgba(32,191,169,.30);
      padding:4px 12px; border-radius:99px;
    }
    .info-panel {
      position:absolute; left:18px; right:18px; bottom:18px; z-index:2;
      background: linear-gradient(180deg, rgba(32,191,169,.14), rgba(6,20,36,.55));
      border:1px solid rgba(32,191,169,.28);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 18px 18px 16px;
    }
    .title-row { display:flex; align-items:flex-end; gap:12px; }
    .icon-mark { font-size: 2.2rem; line-height:1; }
    h1 { margin:0; font-size: var(--text-xl); letter-spacing:.02em; }
    .latin { margin-top:2px; font-size: clamp(1.1rem, 0.9rem + 0.9vw, 1.6rem); font-style: italic; font-weight:700; color: #20bfa9; }
    .meta { margin-top:14px; display:grid; gap:10px; }
    .meta-item {
      display:flex; justify-content:space-between; gap:14px; padding:10px 12px;
      border-radius:16px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
      font-size: var(--text-sm);
    }
    .meta-item .label { color: var(--color-text-muted); }
    .meta-item .val { color: var(--color-text); font-weight:500; text-align:right; }
    .badge {
      display:inline-block; font-size:0.72rem; font-weight:700; letter-spacing:.08em;
      padding:2px 8px; border-radius:99px; text-transform:uppercase;
    }
    .badge-teal  { background:rgba(32,191,169,.18); color:#20bfa9; border:1px solid rgba(32,191,169,.35); }
    .badge-gray  { background:rgba(255,255,255,.08); color:rgba(238,245,255,.65); border:1px solid rgba(255,255,255,.12); }
    .actions { margin-top:14px; display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; }
    .action {
      min-height:60px; border-radius:18px; text-decoration:none; color:var(--color-text);
      border:1px solid rgba(32,191,169,.18); background:rgba(32,191,169,.07);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
      font-size: var(--text-xs); font-weight:700; letter-spacing:.06em;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .action:hover { background:rgba(32,191,169,.16); border-color:rgba(32,191,169,.38); }
    .action svg { width:18px; height:18px; }
    .tagline { margin-top:12px; font-size: var(--text-xs); color: var(--color-text-faint); text-align:center; }
    .skip { position:absolute; left:-9999px; }
    .skip:focus { left:12px; top:12px; z-index:4; background:#fff; color:#000; padding:8px 12px; border-radius:8px; }
  </style>
</head>
<body>
  <a class="skip" href="#main">跳到內容</a>
  <main id="main" class="shell">
    <article class="card" aria-label="🤖 Perplexity 角色卡 UI">
      <div class="photo">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="code-rain" id="rain"></div>
      </div>
      <div class="veil"></div>
      <div class="topbar">
        <a class="icon-btn" href="#" aria-label="返回">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <a class="icon-btn" href="https://www.notion.so/367f8aa4e6e081a48455e6e2b1338e3d" target="_blank" aria-label="Notion 角色卡">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        </a>
      </div>
      <div class="ai-avatar">
        <div class="ai-orb">🤖</div>
        <div class="ai-status">● 外部 AI · 即時查詢</div>
      </div>
      <div class="info-panel">
        <div class="title-row">
          <span class="icon-mark">🤖</span>
          <div>
            <h1>Perplexity</h1>
            <div class="latin">RK-PERPLEXITY</div>
          </div>
        </div>
        <div class="meta">
          <div class="meta-item">
            <span class="label">個性</span>
            <span class="val">直接・即時・可追蹤・不假設</span>
          </div>
          <div class="meta-item">
            <span class="label">負責大方向</span>
            <span class="val">外部資訊查詢・即時搜尋・外部驗證</span>
          </div>
          <div class="meta-item">
            <span class="label">啟用方式</span>
            <span class="val">🤖 開頭 或直呼 Perplexity</span>
          </div>
          <div class="meta-item">
            <span class="label">記憶</span>
            <span class="val"><span class="badge badge-gray">每次對話獨立</span></span>
          </div>
          <div class="meta-item">
            <span class="label">角色層級</span>
            <span class="val"><span class="badge badge-teal">外部 AI</span> <span class="badge badge-gray">非系統核心</span></span>
          </div>
        </div>
        <div class="actions">
          <a class="action" href="https://www.notion.so/367f8aa4e6e081a48455e6e2b1338e3d" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            角色卡
          </a>
          <a class="action" href="https://www.notion.so/367f8aa4e6e081fd8826e84089fa3368" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            角色總表
          </a>
          <a class="action" href="https://perplexity.ai" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            即時查詢
          </a>
        </div>
        <p class="tagline">⚠️ 外部資訊須由使用者確認後才可寫入系統 · 不繞過 🎩 大管家保護</p>
      </div>
    </article>
  </main>
  <script>
    const rain = document.getElementById('rain');
    const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
    const cols = 22;
    for (let i = 0; i < cols; i++) {
      const col = document.createElement('div');
      col.className = 'col';
      col.style.setProperty('--dur', (5 + Math.random() * 8).toFixed(1));
      col.style.setProperty('--delay', (-Math.random() * 10).toFixed(1));
      const len = 18 + Math.floor(Math.random() * 20);
      for (let j = 0; j < len; j++) {
        const span = document.createElement('span');
        span.textContent = chars[Math.floor(Math.random() * chars.length)];
        col.appendChild(span);
      }
      rain.appendChild(col);
    }
  </script>
</body>
</html>
